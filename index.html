<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITO Travels Hub</title>

    <!-- Performance: Preconnect to font domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Performance: Preload Critical Hero Image -->
    <link rel="preload" as="image" href="/hero-beach.jpg" fetchpriority="high" />

    <!-- Performance: Critical Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root">
      <!-- Prerendered Skeleton for instant FCP/LCP -->
      <div style="min-height: 100vh; background-color: #240000; position: relative; overflow: hidden; display: flex; align-items: flex-end;">
        <div style="position: absolute; inset: 0;">
          <img src="/hero-beach.jpg" alt="Litoral" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.9;" fetchpriority="high" decoding="async" />
          <div style="position: absolute; inset: 0; background: linear-gradient(to top, #240000, rgba(36, 0, 0, 0.6), rgba(36, 0, 0, 0.2));"></div>
        </div>
        <div style="position: relative; width: 100%; padding: 8rem 1.5rem 4rem 1.5rem; max-width: 80rem; margin: 0 auto;">
          <h1 style="font-family: sans-serif; font-weight: 800; font-size: 3rem; color: white; line-height: 1;">Viagens pensadas<br/><span style="color: #ed5f36;">com cuidado</span>,<br/>entregues com excelência.</h1>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
